name: Train and Evaluate Models

on:
  push:
    branches:
      - kernelridge

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DecisionTreeRegressor (train.py)
        run: python train.py

      - name: Run KernelRidge (train2.py)
        run: python train2.py
